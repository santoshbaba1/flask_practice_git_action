name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging
  release:
    types: [created]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Set Environment Variables
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> $GITHUB_ENV

      - name: Run Tests
        run: |
          pytest -v

  deploy-to-staging:
    needs: build-test
    if: contains(github.ref, 'staging') #if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Staging Server
    #    run: |
    #      echo "Deploying to STAGING..."
          # Example (replace with real deployment)
          # ssh user@staging-server "cd app && git pull && docker-compose up -d"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            echo "🚀 Deploying to STAGING..."

            cd flask_practice_git_action || exit 1

            echo "📥 Pull latest code"
            git pull origin staging

            echo "🛑 Stop old containers"
            docker-compose down

            echo "🔨 Build new containers"
            docker-compose build

            echo "▶️ Start containers"
            docker-compose up -d

            echo "🧹 Clean unused images"
            docker image prune -f

  deploy-to-production:
    needs: deploy-to-staging
    if: startsWith(github.ref, 'refs/tags/') #if: github.ref == 'refs/heads/main' #if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production Server
        run: |
          echo "Deploying to PRODUCTION..."
          # Example:
          # ssh user@prod-server "cd app && git pull && docker-compose up -d"
