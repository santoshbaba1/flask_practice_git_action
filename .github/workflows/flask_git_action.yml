name: CI/CD Pipeline

on:
  push:
    branches:
      - staging

jobs:
# -------------------------
# 1. BUILD & TEST
# -------------------------
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "Run your tests here"

# -------------------------
# 2. BUILD & PUSH DOCKER IMAGE
# -------------------------
  build-push:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:staging .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:staging

# -------------------------
# 3. DEPLOY TO STAGING SERVER
# -------------------------
  deploy-staging:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
          "MONGO_URI='${MONGO_URI}' bash -s" << EOF
          set -e

        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "🚀 Deploying to STAGING..."

            cd ~/flask_practice_git_action || exit 1

            echo "📥 Pull latest code"
            git pull origin staging

            echo "🐳 Pull latest Docker image"
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:staging

            echo "🛑 Stop old containers"
            docker compose down

            echo "▶️ Start new containers"
            docker compose up -d

            echo "🧹 Cleanup"
            docker image prune -f

            echo "✅ Deployment complete"
