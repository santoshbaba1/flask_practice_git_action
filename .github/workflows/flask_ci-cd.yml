name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  release:
    types: [created]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        pytest

    - name: Build Step
      run: echo "Build Successful"

  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
    - name: Deploy to Staging Server
      run: |
        echo "Deploying to STAGING..."
        # Example: SSH deploy
        # ssh user@staging-server "cd app && git pull && docker restart app"

  deploy-production:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - name: Deploy to Production Server
      run: |
        echo "Deploying to PRODUCTION..."
        # Example:
        # ssh user@prod-server "cd app && git pull && docker restart app"
