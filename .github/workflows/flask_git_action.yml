name: Flask CI/CD Pipeline
on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      env:
          # This maps the GitHub Secret to an environment variable
          MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        pip install pytest
        pytest

  
